name: Build Zygisk Mod from ZIP

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Install Unzip
      run: sudo apt-get install -y unzip

    - name: Extract Zygisk Source ZIP
      run: |
        unzip "ZYGISK SRC RAMA MODZ.zip" -d ./
        ls -la

    - name: Set up JDK 8
      uses: actions/setup-java@v4
      with:
        java-version: '8'
        distribution: 'temurin'

    - name: Download and Set up Android NDK r17b
      run: |
        # Unduh di folder lokal yang diizinkan
        wget -q https://google.com
        unzip -q android-ndk-r17b-linux-x86_64.zip
        rm android-ndk-r17b-linux-x86_64.zip
        # Set variabel lingkungan ke folder lokal ini
        echo "ANDROID_NDK_HOME=$GITHUB_WORKSPACE/android-ndk-r17b" >> $GITHUB_ENV
        echo "$GITHUB_WORKSPACE/android-ndk-r17b" >> $GITHUB_PATH

    - name: Build Zygisk ARM64 via ndk-build
      run: |
        JNI_DIR=$(find . -name "jni" -type d | head -n 1)
        if [ -n "$JNI_DIR" ]; then
          cd "$JNI_DIR/.."
          $GITHUB_WORKSPACE/android-ndk-r17b/ndk-build APP_ABI=arm64-v8a NDK_PROJECT_PATH=.
        else
          GRADLEW_PATH=$(find . -name "gradlew" | head -n 1)
          if [ -n "$GRADLEW_PATH" ]; then
            cd $(dirname "$GRADLEW_PATH")
            chmod +x gradlew
            ./gradlew assembleRelease
          else
            echo "Format build tidak ditemukan!"
            exit 1
          fi
        fi

    - name: Upload Build Artifact (ARM64)
      uses: actions/upload-artifact@v4
      with:
        name: Zygisk-Mod-ARM64-Release
        path: |
          **/libs/arm64-v8a/*
          **/out/*.zip
          **/build/outputs/**/*.zip
