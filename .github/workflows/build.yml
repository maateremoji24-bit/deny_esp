name: Build Zygisk Mod from ZIP

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Install Unzip
      run: sudo apt-get install -y unzip

    - name: Extract Zygisk Source ZIP
      run: |
        unzip "ZYGISK SRC RAMA MODZ.zip" -d ./
        ls -la

    - name: Set up JDK 8
      uses: actions/setup-java@v4
      with:
        java-version: '8'
        distribution: 'temurin'

    - name: Setup Android NDK r17b Resmi
      uses: ammarahm-ed/setup-android-ndk@v1
      with:
        ndk-version: r17b

    - name: Build Zygisk ARM64 via ndk-build
      run: |
        # Mencari folder jni
        JNI_DIR=$(find . -name "jni" -type d | head -n 1)
        if [ -n "$JNI_DIR" ]; then
          cd "$JNI_DIR/.."
          ndk-build APP_ABI=arm64-v8a NDK_PROJECT_PATH=.
        else
          GRADLEW_PATH=$(find . -name "gradlew" | head -n 1)
          if [ -n "$GRADLEW_PATH" ]; then
            cd $(dirname "$GRADLEW_PATH")
            chmod +x gradlew
            ./gradlew assembleRelease
          else
            echo "Format build tidak ditemukan!"
            exit 1
          fi
        fi

    - name: Upload Build Artifact (ARM64)
      uses: actions/upload-artifact@v4
      with:
        name: Zygisk-Mod-ARM64-Release
        path: |
          **/libs/arm64-v8a/*
          **/out/*.zip
          **/build/outputs/**/*.zip
