name: Build Zygisk Mod from ZIP

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Install Unzip & Curl
      run: sudo apt-get update && sudo apt-get install -y unzip curl

    - name: Extract Zygisk Source ZIP
      run: |
        unzip "ZYGISK SRC RAMA MODZ.zip" -d ./
        ls -la

    - name: Set up Java JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'

    - name: Unduh Manual Android NDK r17b Resmi Google
      run: |
        # Mengunduh langsung ke folder workspace yang diizinkan penuh
        curl -L -o ndk_r17b.zip https://google.com
        unzip -q ndk_r17b.zip
        rm ndk_r17b.zip
        # Mendaftarkan path NDK ke sistem environment runner
        echo "ANDROID_NDK_HOME=$GITHUB_WORKSPACE/android-ndk-r17b" >> $GITHUB_ENV
        echo "$GITHUB_WORKSPACE/android-ndk-r17b" >> $GITHUB_PATH

    - name: Build Zygisk ARM64 via ndk-build
      run: |
        # Mencari letak folder jni untuk eksekusi ndk-build resmi
        JNI_DIR=$(find . -name "jni" -type d | head -n 1)
        if [ -n "$JNI_DIR" ]; then
          cd "$JNI_DIR/.."
          $GITHUB_WORKSPACE/android-ndk-r17b/ndk-build APP_ABI=arm64-v8a NDK_PROJECT_PATH=.
        else
          # Langkah cadangan jika source code memakai wrapper gradle
          GRADLEW_PATH=$(find . -name "gradlew" | head -n 1)
          if [ -n "$GRADLEW_PATH" ]; then
            cd $(dirname "$GRADLEW_PATH")
            chmod +x gradlew
            ./gradlew assembleRelease
          else
            echo "Berkas build ndk atau gradle tidak ditemukan!"
            exit 1
          fi
        fi

    - name: Upload Build Artifact (ARM64)
      uses: actions/upload-artifact@v4
      with:
        name: Zygisk-Mod-ARM64-Release
        path: |
          **/libs/arm64-v8a/*
          **/out/*.zip
          **/build/outputs/**/*.zip
